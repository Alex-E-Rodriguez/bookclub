<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Welcome</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
    <div th:insert="~{fragments/header :: header}"></div>
    <main>
        <section class="py-5 text-center container">
            <div class="row py-lg-5">
                <div class="col-lg-6 col-md-8 mx-auto">
                    <h1 class="fw-light">Book Club</h1>
                    <p class ="lead text-muted">
                        Welcome to the Book Club app, your "one-stop shop" for all of your book club needs.
                        Below you will find a list of this month's top 10 favorite books.
                        Select the book to see its details.
                    </p>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 col-lg-4 mb-4" th:each="book : ${books}">
                    <div class="card h-100 text-center">
                        <div class="card-body">
                            <p class="card-text">
                                <span th:text="${book.getTitle()}"></span>
                                <br />
                                <small class="text-muted"><em th:text="${book.getIsbn()}"></em></small>
                            </p>
                            <div class="btn-group">
                                <a href="#" th:href="@{/{id}(id=${book.getIsbn()})}" class="btn btn-sm btn-outline-secondary">View</a>
                                <a href="#" th:href="${book.getInfoURL()}" class="btn btn-sm btn-outline-secondary" target="_blank">Web Link</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div th:insert="~{fragments/footer :: footer}"></div>
    <div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>
</body>
</html>
