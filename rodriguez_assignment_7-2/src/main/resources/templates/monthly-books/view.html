<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | View Book</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous">
</head>
<body>
<div th:insert="~{fragments/header :: header}"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-auto">
            <div class="card" style="width: 18rem; ">
                <div class="card-body">
                    <h5 class="card-title-center" th:text="${book.getTitle()}"></h5>
                    <div class="card-subtitle text-muted">
                        Pages: <span th:text="${book.getNumOfPages()}"></span>
                    </div>
                    <br />
                    <div class="card-text">
                        <p>
                            <strong>Description:</strong><br /><span th:text="${book.getDescription()}"></span>
                        </p>
                        <strong>Web Link:</strong>
                        <p>
                            <a href="#" th:href="${book.getInfoURL()}" th:text="${book.getInfoURL()}"></a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>
</body>
</html>
