<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | View Book</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous">
</head>
<body>
<div th:insert="~{fragments/header :: header}"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-auto">
            <div class="card" style="width: 18rem; ">
                <div class="card-body">
                    <h5 class="card-title-center" th:text="${book.getTitle()}"></h5>
                    <p class="card-text-center" th:text="${book.getDescription()}"></p>
                    <p class="card-text-center" th:text="${book.getIsbn()}"></p>
                    <p class="card-text-center" >
                        <span th:text="${book.getNumOfPages()}"></span>
                        pages
                    </p>
                    <strong>Authors:</strong>
                    <ul th:each="author : ${book.getAuthors()}">
                        <li th:text="${author}"></li>
                    </ul>
                    <a href="/" th:href="@{/}" class="btn btn-primary">Return to books</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>
</body>
</html>
