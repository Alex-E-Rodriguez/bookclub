<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Wishlist</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous">
</head>
<body>
<div th:insert="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-auto">
            <p class = "text-center">
                <a href="/wishlist/new" th:href="@{/wishlist/new}" class="btn btn-outline-secondary text-center">New Wishlist Item</a>
            </p>
            <table class="table">
                <thead class="table-light">
                    <tr>
                        <th>ISBN</th>
                        <th>Title</th>
                        <th>Functions</th>
                    </tr>
                </thead>
                <tbody>
                <tr th:if="${wishlist.isEmpty()}">
                    <td colspan="2" class="text-center"> No Items on Wishlist</td>
                </tr>
                <tr th:each="item : ${wishlist}">
                    <td><span th:text="${item.getIsbn()}">ISBN</span></td>
                    <td><span th:text="${item.getTitle()}">Title</span></td>
                    <td>
                        <a href="#" class="link">Edit</a> |
                        <a href="#" class="link">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>
</body>
</html>
