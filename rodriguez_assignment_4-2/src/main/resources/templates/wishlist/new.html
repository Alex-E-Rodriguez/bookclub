<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | New Wishlist Item</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous">
</head>
<body>
<div th:insert="~{fragments/header :: header}"></div>


<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-auto">
            <form action="#" th:action="@{/wishlist}" th:object="${wishlistItem}" method="post">
                <div class="mb-3">
                    <label for="isbn" class="form-label">IBSN</label>
                    <input type="text" class="form-control" id="isbn" name="isbn" th:field="*{isbn}"/>
                    <small th:if="${#fields.hasErrors('isbn')}" style="color: red"; th:errors="*{isbn}"></small>
                </div>
                <div class="mb-3">
                    <label for="title" class="form-label">Title</label>
                    <input type="text" class="form-control" id="title" name="title" th:field="*{title}"/>
                    <small th:if="${#fields.hasErrors('title')}" style="color: red"; th:errors="*{title}"></small>
                </div>
                <p class = "text-right">
                    <button class="btn btn-outline-secondary text-center" type="submit">Save</button>
                </p>
            </form>
        </div>
        <a href="/wishlist" th:href="@{/wishlist}">Return to Wishlist</a>
    </div>
</div>


<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>
</body>
</html>
